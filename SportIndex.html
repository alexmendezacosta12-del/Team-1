<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clerks UK Sport | Bold. Fast. Fearless.</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page-enter">
    <header>
      <h1><a href="SportIndex.html">C L E R K S.</a></h1>
      <button class="hamburger" id="hamburger" aria-label="Toggle navigation" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <nav class="navbar" id="main-nav">
        <ul>
          <li><a href="Shop.html">Sport Shop</a></li>
          <li><a href="sport-wishlist.html">Wishlist ♡</a></li>
          <li id="s-nav-orders-li" style="display:none;"><a href="sport-orders.html">My Orders</a></li>
          <li><a href="About.html">About Us</a></li>
          <li><a href="Contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main class="sport-landing-main">
      <div class="htext">
        <p id="p1">Step Into</p>
        <p id="p2">Your Next</p>
        <p id="p3">Chapter</p>
        <div class="landing-cta-row">
          <a href="Shop.html" class="landing-shop-btn">Shop Now</a>
          <button id="auth-signin-btn" class="landing-signin-btn">Sign In &amp; Save 10%</button>
        </div>
      </div>
      <a href="Shop.html"
        ><img id="orgshoe" src="Shoes.png" alt="Shoe Image"
      /></a>
      <p id="p4">
        SIGN IN - 10% OFF - 10% OFF - 10% OFF - 10% OFF - 10% OFF - 10% OFF -
        SIGN IN
      </p>
      <div class="sport-landing-clear"></div>
    </main>

    <footer>
      <p id="footer">
        © 2026 Clerks UK. All rights reserved. | Step Into Your Next Chapter
      </p>
    </footer>

    <script src="js/auth.js"></script>
    <script>
      document.getElementById('hamburger').addEventListener('click', function () {
        this.classList.toggle('open');
        document.getElementById('main-nav').classList.toggle('nav-open');
        this.setAttribute('aria-expanded', this.classList.contains('open'));
      });
    </script>
    <script>
      document.addEventListener('click', function (e) {
        const link = e.target.closest('a[href]');
        if (!link) return;
        const href = link.getAttribute('href');
        if (!href || href.startsWith('#') || link.target === '_blank') return;
        // Don't intercept the shoe image link to avoid double-intercept issues
        e.preventDefault();
        document.body.classList.add('page-leaving');
        setTimeout(function () { window.location.href = href; }, 300);
      });
    </script>
  </body>
</html>
